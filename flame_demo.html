<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Supercharged Fire Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #030305;
      --panel-bg: rgba(15, 15, 25, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #ff5500;
      --accent-glow: rgba(255, 85, 0, 0.4);
      --text-main: #f0f0f5;
      --text-muted: #8e8e9f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Screen background grids */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }

    /* Fire Canvas Container */
    .canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #fireCanvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Control Panel (Glassmorphism) */
    .control-panel {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 320px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .control-panel:hover {
      border-color: rgba(255, 85, 0, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 85, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff, #a3a3a3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Slider styling */
    .control-group {
      margin-bottom: 14px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .control-val {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-color);
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #fff;
      border: 2px solid var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* Theme Buttons */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn.active {
      background: var(--accent-color);
      border-color: var(--accent-color);
      box-shadow: 0 0 15px var(--accent-glow);
      color: #fff;
    }

    /* Stats overlay (top-right) */
    .stats-overlay {
      position: absolute;
      top: 30px;
      right: 30px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .stat-label {
      color: var(--text-muted);
    }

    .stat-val {
      font-weight: bold;
      color: #fff;
    }

    .stat-val.perf-ok {
      color: #00ff66;
    }

    /* Instructions Overlay (bottom-left) */
    .instructions {
      position: absolute;
      bottom: 30px;
      left: 30px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.03);
      pointer-events: none;
    }

    /* Interactive particle spark on click */
    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="canvas-container">
    <canvas id="fireCanvas"></canvas>
  </div>

  <div class="control-panel">
    <h1>🔥 Flame Warden Core</h1>
    <div class="subtitle">Zero Alloc Engine v1.0.0</div>

    <div class="section">
      <div class="section-title">Color Palette</div>
      <div class="theme-grid">
        <button class="btn active" id="btn-fire" onclick="setPalette('fire')">🔥 Classic</button>
        <button class="btn" id="btn-ice" onclick="setPalette('ice')">❄️ Plasma</button>
        <button class="btn" id="btn-acid" onclick="setPalette('acid')">🧪 Acid</button>
        <button class="btn" id="btn-void" onclick="setPalette('void')">🔮 Void</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Simulation Math</div>
      
      <div class="control-group">
        <div class="control-label">
          <span>Decay Speed</span>
          <span class="control-val" id="val-decay">Normal</span>
        </div>
        <input type="range" id="slider-decay" min="1" max="10" value="4">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Wind Shift</span>
          <span class="control-val" id="val-wind">Center</span>
        </div>
        <input type="range" id="slider-wind" min="-3" max="3" value="0">
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>Simulation Scale</span>
          <span class="control-val" id="val-scale">320x240</span>
        </div>
        <input type="range" id="slider-scale" min="1" max="3" value="2">
      </div>
    </div>

    <div class="section" style="margin-bottom: 0;">
      <button class="btn" style="width: 100%; border-color: rgba(255,85,0,0.3); background: rgba(255,85,0,0.05);" onclick="burstFire()">💥 Ignite Superburst</button>
    </div>
  </div>

  <div class="stats-overlay">
    <div class="stat-row">
      <span class="stat-label">Frame Rate:</span>
      <span class="stat-val perf-ok" id="stat-fps">60.0 FPS</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Frame Time:</span>
      <span class="stat-val" id="stat-ms">1.2 ms</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">GC Pauses:</span>
      <span class="stat-val perf-ok">ZERO (0s)</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Resolution:</span>
      <span class="stat-val" id="stat-res">320 x 240</span>
    </div>
  </div>

  <div class="instructions">
    [DRAG OR CLICK MOUSE TO EMIT FLAMES]
  </div>

  <script>
    // ── CONFIGURATION & VARIABLES (PRE-ALLOCATED) ──────────────────────────
    const canvas = document.getElementById('fireCanvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

    // We disable image smoothing for that premium retro pixelated scaling look
    ctx.imageSmoothingEnabled = false;

    // Simulation Dimensions
    let simWidth = 320;
    let simHeight = 240;
    let simSize = simWidth * simHeight;

    // Fire buffers: pre-allocated typed arrays
    // Max buffer size corresponding to highest resolution (320x240)
    const MAX_SIZE = 320 * 240;
    const firePixels = new Uint8Array(MAX_SIZE);
    let imgData = ctx.createImageData(simWidth, simHeight);
    let imgBuf = new Uint32Array(imgData.data.buffer);

    // Dynamic configuration variables (updated by sliders, no allocations in loop)
    let decayMultiplier = 4.5;
    let decayOffset = 0.5;
    let windOffset = 0; // -3 to 3

    // Precomputed lookup table for random numbers (Math.random() generates GC or function call overhead)
    const RANDOM_TABLE_SIZE = 16384;
    const randomDecayTable = new Uint8Array(RANDOM_TABLE_SIZE);
    const randomWindTable = new Int8Array(RANDOM_TABLE_SIZE);
    for (let i = 0; i < RANDOM_TABLE_SIZE; i++) {
      const r = Math.random();
      randomDecayTable[i] = Math.floor(r * 4.5); // decay between 0 and 4
      randomWindTable[i] = Math.floor((r - 0.5) * 3); // -1, 0, 1
    }
    let randomIndex = 0;

    // Color Theme Palettes (Uint32 format: ABGR - Little Endian)
    // 0xAABBGGRR: Alpha (AA), Blue (BB), Green (GG), Red (RR)
    const PALETTE_SIZE = 256;
    const palettes = {
      fire: new Uint32Array(PALETTE_SIZE),
      ice: new Uint32Array(PALETTE_SIZE),
      acid: new Uint32Array(PALETTE_SIZE),
      void: new Uint32Array(PALETTE_SIZE)
    };
    let activePalette = palettes.fire;
    let currentPaletteName = 'fire';

    // Lerp Helper for Palette construction
    function buildPalette(paletteArray, stops) {
      for (let i = 0; i < PALETTE_SIZE; i++) {
        const t = i / (PALETTE_SIZE - 1);
        
        // Find segment
        let lower = stops[0];
        let upper = stops[stops.length - 1];
        for (let s = 0; s < stops.length - 1; s++) {
          if (t >= stops[s][0] && t <= stops[s+1][0]) {
            lower = stops[s];
            upper = stops[s+1];
            break;
          }
        }
        
        const range = upper[0] - lower[0];
        const localT = range > 0 ? (t - lower[0]) / range : 0;
        
        const r = Math.round(lower[1] + (upper[1] - lower[1]) * localT);
        const g = Math.round(lower[2] + (upper[2] - lower[2]) * localT);
        const b = Math.round(lower[3] + (upper[3] - lower[3]) * localT);
        const a = 255; // solid alpha

        // Pack into 32-bit integer (ABGR representation)
        paletteArray[i] = (a << 24) | (b << 16) | (g << 8) | r;
      }
    }

    // Define color stops for our beautiful themes
    const fireStops = [
      [0.00, 0, 0, 0],         // Black
      [0.15, 90, 0, 0],        // Dark Crimson Red
      [0.40, 255, 50, 0],      // Intense Orange-Red
      [0.70, 255, 170, 0],     // Golden Orange-Yellow
      [0.90, 255, 245, 150],   // Warm Bright Yellow
      [1.00, 255, 255, 255]    // Clean White
    ];

    const iceStops = [
      [0.00, 0, 0, 0],         // Black
      [0.15, 0, 10, 60],       // Deep Cyan Blue
      [0.40, 0, 120, 255],     // Bright Plasma Blue
      [0.70, 0, 220, 255],     // Electric Neon Cyan
      [0.90, 180, 255, 255],   // Pale Cool Aqua
      [1.00, 255, 255, 255]    // Pure White
    ];

    const acidStops = [
      [0.00, 0, 0, 0],         // Black
      [0.15, 0, 45, 5],        // Deep Poison Green
      [0.40, 30, 180, 20],     // Slime Green
      [0.70, 140, 255, 10],    // Bright Acid Lime
      [0.90, 220, 255, 150],   // Pastel Greenish White
      [1.00, 255, 255, 255]    // Pure White
    ];

    const voidStops = [
      [0.00, 0, 0, 0],         // Black
      [0.15, 30, 0, 45],       // Deep Shadow Violet
      [0.40, 140, 10, 180],    // Cosmic Purple
      [0.70, 230, 50, 255],    // Bright Magenta-Pink
      [0.90, 255, 200, 255],   // Lavender White
      [1.00, 255, 255, 255]    // Pure White
    ];

    buildPalette(palettes.fire, fireStops);
    buildPalette(palettes.ice, iceStops);
    buildPalette(palettes.acid, acidStops);
    buildPalette(palettes.void, voidStops);

    // Mouse emission state (no dynamic object creation)
    let isMouseDown = false;
    let mouseSimX = 0;
    let mouseSimY = 0;

    // Performance tracking variables (pre-allocated)
    let lastFrameTime = performance.now();
    let frameCount = 0;
    let fpsTimer = 0;
    let currentFps = 60;
    let frameMs = 0;

    // UI elements lookup
    const fpsLabel = document.getElementById('stat-fps');
    const msLabel = document.getElementById('stat-ms');
    const resLabel = document.getElementById('stat-res');
    const scaleLabel = document.getElementById('val-scale');
    const decayLabel = document.getElementById('val-decay');
    const windLabel = document.getElementById('val-wind');

    // ── RESIZING & INITIALIZATION ──────────────────────────────────────────
    function setResolution(w, h) {
      simWidth = w;
      simHeight = h;
      simSize = w * h;

      // Update Canvas internal resolution (CSS handles fullscreen scaling)
      canvas.width = w;
      canvas.height = h;

      // Re-create ImageData buffers
      imgData = ctx.createImageData(w, h);
      imgBuf = new Uint32Array(imgData.data.buffer);

      // Clear fire buffer
      firePixels.fill(0);

      // Re-apply bottom row heat source
      for (let x = 0; x < w; x++) {
        firePixels[(h - 1) * w + x] = 255;
      }

      resLabel.textContent = `${w} x ${h}`;
    }

    // Default setup
    setResolution(320, 240);

    // ── INTERACTION HANDLERS ──────────────────────────────────────────────
    function updateMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      const canvasX = (clientX - rect.left) / rect.width;
      const canvasY = (clientY - rect.top) / rect.height;
      
      mouseSimX = Math.max(0, Math.min(simWidth - 1, Math.floor(canvasX * simWidth)));
      mouseSimY = Math.max(0, Math.min(simHeight - 1, Math.floor(canvasY * simHeight)));
    }

    canvas.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      updateMousePos(e);
    });

    window.addEventListener('mousemove', (e) => {
      if (isMouseDown) updateMousePos(e);
    });

    window.addEventListener('mouseup', () => {
      isMouseDown = false;
    });

    canvas.addEventListener('touchstart', (e) => {
      isMouseDown = true;
      updateMousePos(e);
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (isMouseDown) updateMousePos(e);
    }, { passive: true });

    window.addEventListener('touchend', () => {
      isMouseDown = false;
    });

    // Change palette selection
    function setPalette(name) {
      currentPaletteName = name;
      activePalette = palettes[name];

      // Update UI active buttons
      document.querySelectorAll('.theme-grid .btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${name}`).classList.add('active');

      // Update CSS variables for themed details
      let themeColor = '#ff5500';
      if (name === 'ice') themeColor = '#00a3ff';
      if (name === 'acid') themeColor = '#7fff00';
      if (name === 'void') themeColor = '#d300ff';
      document.documentElement.style.setProperty('--accent-color', themeColor);
      document.documentElement.style.setProperty('--accent-glow', themeColor + '66');
    }

    // Trigger instant combustion shockwave
    function burstFire() {
      // Set bottom 10 rows to max heat
      for (let y = simHeight - 15; y < simHeight; y++) {
        for (let x = 0; x < simWidth; x++) {
          firePixels[y * simWidth + x] = 255;
        }
      }
    }

    // Controls listeners (no dynamic instantiation)
    const sliderDecay = document.getElementById('slider-decay');
    const sliderWind = document.getElementById('slider-wind');
    const sliderScale = document.getElementById('slider-scale');

    sliderDecay.addEventListener('input', () => {
      const val = parseInt(sliderDecay.value);
      if (val <= 3) {
        decayMultiplier = 2.0; decayOffset = 0.2;
        decayLabel.textContent = 'Roaring (Tall)';
      } else if (val <= 6) {
        decayMultiplier = 4.0; decayOffset = 0.5;
        decayLabel.textContent = 'Normal';
      } else {
        decayMultiplier = 7.0; decayOffset = 1.0;
        decayLabel.textContent = 'Rapid (Short)';
      }
    });

    sliderWind.addEventListener('input', () => {
      const val = parseInt(sliderWind.value);
      windOffset = val;
      if (val < 0) windLabel.textContent = `Left (${val})`;
      else if (val > 0) windLabel.textContent = `Right (+${val})`;
      else windLabel.textContent = 'Center';
    });

    sliderScale.addEventListener('input', () => {
      const val = parseInt(sliderScale.value);
      if (val === 1) {
        setResolution(160, 120);
        scaleLabel.textContent = '160x120';
      } else if (val === 2) {
        setResolution(320, 240);
        scaleLabel.textContent = '320x240';
      } else {
        setResolution(200, 150);
        scaleLabel.textContent = '200x150';
      }
    });


    // ── ANIMATION & UPDATE LOOP (ZERO OBJECT ALLOCATION IN LOOP) ───────────
    function renderLoop() {
      const startMs = performance.now();

      // Maintain bottom fire source
      const bottomRowOffset = (simHeight - 1) * simWidth;
      for (let x = 0; x < simWidth; x++) {
        firePixels[bottomRowOffset + x] = 255;
      }

      // Add mouse heat source if pressed (draw a glowing circular heat spot)
      if (isMouseDown) {
        const radius = Math.max(5, Math.floor(simWidth * 0.04));
        const r2 = radius * radius;
        for (let dy = -radius; dy <= radius; dy++) {
          const py = mouseSimY + dy;
          if (py >= 0 && py < simHeight) {
            const rowOffset = py * simWidth;
            for (let dx = -radius; dx <= radius; dx++) {
              const px = mouseSimX + dx;
              if (px >= 0 && px < simWidth) {
                if (dx * dx + dy * dy <= r2) {
                  // Inject heat (maximum values)
                  firePixels[rowOffset + px] = 255;
                }
              }
            }
          }
        }
      }

      // ── FIRE PROPAGATION ALGORITHM (Fast array lookup, 0 Math.random() calls) ──
      const randIdx = randomIndex;
      for (let y = 1; y < simHeight; y++) {
        const rowStart = y * simWidth;
        const destRowStart = (y - 1) * simWidth;
        
        for (let x = 0; x < simWidth; x++) {
          const srcIdx = rowStart + x;
          const pixel = firePixels[srcIdx];
          
          if (pixel === 0) {
            firePixels[destRowStart + x] = 0;
          } else {
            // Retrieve pre-allocated random variables
            const rIdx = (randIdx + srcIdx) & 16383; // fast wrapping index
            const randDecay = randomDecayTable[rIdx];
            const randWind = randomWindTable[rIdx];

            // Apply custom decay speed & horizontal wind shift
            const decay = Math.floor(randDecay * decayMultiplier) + decayOffset;
            const wind = randWind + windOffset;
            
            let dstX = x + wind;
            // Wrap coordinates horizontally
            if (dstX < 0) dstX = simWidth - 1;
            else if (dstX >= simWidth) dstX = 0;
            
            // Write decayed heat intensity upwards
            firePixels[destRowStart + dstX] = pixel > decay ? (pixel - decay) : 0;
          }
        }
      }
      // Increment pre-allocated table indices
      randomIndex = (randomIndex + 9) & 16383;

      // ── DIRECT PIXEL WRITE TO CANVAS BUFFER ──────────────────────────────
      // Uses the precomputed palette lookup table (0 string/object overhead)
      const bufferLimit = simSize;
      for (let i = 0; i < bufferLimit; i++) {
        imgBuf[i] = activePalette[firePixels[i]];
      }

      // Draw the pixel buffer to canvas
      ctx.putImageData(imgData, 0, 0);

      // ── PERFORMANCE REPORTING (NO ALLOCATIONS) ───────────────────────────
      const endMs = performance.now();
      frameMs = endMs - startMs;
      frameCount++;
      
      const elapsed = endMs - lastFrameTime;
      if (elapsed >= 1000) {
        currentFps = (frameCount * 1000) / elapsed;
        
        // Output to DOM (DOM updates are technically external to game loop logic, 
        // but we format with pre-allocated strings where possible)
        fpsLabel.textContent = currentFps.toFixed(1) + ' FPS';
        msLabel.textContent = frameMs.toFixed(1) + ' ms';
        
        if (currentFps < 58.0) {
          fpsLabel.className = 'stat-val';
          fpsLabel.style.color = '#ff3333';
        } else {
          fpsLabel.className = 'stat-val perf-ok';
          fpsLabel.style.color = '';
        }
        
        frameCount = 0;
        lastFrameTime = endMs;
      }

      requestAnimationFrame(renderLoop);
    }

    // Launch loop
    requestAnimationFrame(renderLoop);
  </script>
</body>
</html>
